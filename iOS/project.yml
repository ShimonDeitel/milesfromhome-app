name: milesfromhome
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    DEVELOPMENT_TEAM: W7Q885Q59C
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  milesfromhome:
    type: application
    platform: iOS
    sources: [milesfromhome]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.milesfromhome
        INFOPLIST_FILE: milesfromhome/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
    info:
      path: milesfromhome/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        CFBundleDisplayName: Miles From Home
  milesfromhomeTests:
    type: bundle.unit-test
    platform: iOS
    sources: [milesfromhomeTests]
    dependencies:
      - target: milesfromhome
  milesfromhomeUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [milesfromhomeUITests]
    dependencies:
      - target: milesfromhome
schemes:
  milesfromhome:
    build:
      targets:
        milesfromhome: all
    test:
      targets:
        - milesfromhomeTests
        - milesfromhomeUITests
